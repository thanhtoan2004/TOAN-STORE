name: Nike Clone CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check Linting
        run: npm run lint

      - name: Run Tests
        run: npm run test
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET || 'ci-test-secret' }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY || '0123456789abcdef0123456789abcdef' }}
          # Mock DB variables for CI build/test
          DB_HOST: 'localhost'
          DB_USER: 'root'
          DB_PASSWORD: ''
          DB_NAME: 'test'

      - name: Build Application
        run: npm run build
        env:
          NEXT_PUBLIC_SENTRY_DSN: ${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}
          JWT_SECRET: ${{ secrets.JWT_SECRET || 'ci-test-secret' }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY || '0123456789abcdef0123456789abcdef' }}
          DB_HOST: 'localhost'
          DB_USER: 'root'
          DB_PASSWORD: ''
          DB_NAME: 'test'
