version: '3.8'

services:
  # MySQL Database
  db:
    image: mysql:8.0
    container_name: nike-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: nike_clone
    ports:
      - "3307:3306" # Tránh xung đột với MySQL cài sẵn (cổng 3306)
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - nike-network

  # Redis for Caching and Background Jobs
  redis:
    image: redis:alpine
    container_name: nike-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always
    networks:
      - nike-network

  # MailHog for Local Email Testing
  mailhog:
    image: mailhog/mailhog
    container_name: nike-mailhog
    ports:
      - "1025:1025" # SMTP server
      - "8025:8025" # Web UI
    networks:
      - nike-network

# Define networks
networks:
  nike-network:
    driver: bridge

# Define persistent volumes
volumes:
  mysql_data:
  redis_data:
