version: '3.8'

services:
  # MySQL Database
  db:
    image: mysql:8.0
    container_name: toan-store-db
    restart: always
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: toan_store
      MYSQL_ROOT_HOST: "%"
    ports:
      - "3307:3306" # Tránh xung đột với MySQL cài sẵn (cổng 3306)
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - toan-network

  # Redis for Caching and Background Jobs
  redis:
    image: redis:alpine
    container_name: toan-store-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - toan-network

  # MailHog for Local Email Testing
  mailhog:
    image: mailhog/mailhog
    container_name: toan-store-mailhog
    ports:
      - "1025:1025" # SMTP server
      - "8025:8025" # Web UI
    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://localhost:8025" ]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - toan-network

  # Meilisearch for Advanced Search
  meilisearch:
    image: getmeili/meilisearch:v1.10
    container_name: toan-store-meilisearch
    environment:
      - MEILI_MASTER_KEY=masterKey # Change in production
    ports:
      - "127.0.0.1:7700:7700"
    volumes:
      - meili_data:/meili_data
    restart: always
    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://localhost:7700/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - toan-network

# Define networks
networks:
  toan-network:
    driver: bridge

# Define persistent volumes
volumes:
  mysql_data:
  redis_data:
  meili_data:
